<!DOCTYPE html>
<html>
<head>
    <title>Карта с точкой</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 400px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Создаем карту и устанавливаем начальные координаты и масштаб
        let map = L.map('map').setView([55.7558, 37.6173], 10); // Координаты Москвы

        // Добавляем слой карты
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Добавляем маркер на карту
        let marker = L.marker([55.7558, 37.6173]).addTo(map);
        marker.bindPopup('<b>Москва!</b>').openPopup();
    </script>
</body>
</html>
